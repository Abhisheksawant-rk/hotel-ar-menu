<!DOCTYPE html>
<html>
<head>
  <title>AR Hotel Menu</title>

  <script type="module"
  src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
  </script>

  <style>
    body{
      font-family:Arial;
      text-align:center;
    }

    model-viewer{
      width:100%;
      height:500px;
    }
  </style>
</head>

<body>

<h1>Chicken Biryani</h1>

<model-viewer
src="pizza.glb"
ar
ar-modes="scene-viewer webxr quick-look"
camera-controls
auto-rotate>

</model-viewer>

<h2>₹299</h2>

</body>
</html>
